# .github/workflows/release.yml -- v* tag release automation.
# Build details are delegated to Makefile targets to keep local and release
# binaries on the same path.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release notes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Validate release notes
        run: make check-release-notes VERSION="${GITHUB_REF_NAME}"

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded frontend
        run: make web-build

      - name: Cross-build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          out="life-ledger-${{ matrix.goos }}-${{ matrix.goarch }}"
          make go-build BIN="${out}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release.md
          files: |
            life-ledger-${{ matrix.goos }}-${{ matrix.goarch }}
