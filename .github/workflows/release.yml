name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Build embedded frontend
        run: npm run build

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          mkdir -p release-dist

          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            package="life-ledger-${tag}-${os}-${arch}"

            mkdir -p "release-dist/${package}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "release-dist/${package}/life-ledger" ./cmd/server
            cp config.example.toml "release-dist/${package}/config.example.toml"

            tar -C release-dist -czf "release-dist/${package}.tar.gz" "${package}"
            rm -rf "release-dist/${package}"
          done

          (cd release-dist && sha256sum *.tar.gz > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-dist/*.tar.gz \
            release-dist/checksums.txt \
            --verify-tag \
            --generate-notes
